{% extends "layout.html" %}
{% block content %}
<div class="min-h-screen bg-[#0f172a] text-white flex items-center justify-center p-6">
  <div class="w-full max-w-xl bg-[#111827] border border-gray-800 rounded-xl p-8 text-center">
    <p class="text-sm text-gray-400 mb-2">Error {{ status_code }}</p>
    <h1 class="text-2xl font-bold mb-3">{{ title }}</h1>
    <p class="text-gray-300 mb-6">{{ message }}</p>

    <div class="flex items-center justify-center gap-3">
      <a href="/chat" class="px-4 py-2 bg-green-600 hover:bg-green-500 rounded-lg text-sm">Go to Chat</a>
      <a href="/auth/login-page" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm">Go to Login</a>
    </div>
  </div>
</div>
{% endblock %}
