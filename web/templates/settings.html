{% extends "layout.html" %}
{% block content %}

<div class="max-w-2xl mx-auto mt-10 bg-gray-800 p-6 rounded-lg">
  <h2 class="text-xl mb-4">Account Settings</h2>

  <div class="space-y-3">
    <div>
      <label class="text-sm text-gray-400">Name</label>
      <div class="bg-gray-700 p-2 rounded">{{ current_user.name }}</div>
    </div>

    <div>
      <label class="text-sm text-gray-400">Email</label>
      <div class="bg-gray-700 p-2 rounded">{{ current_user.email }}</div>
    </div>
  </div>

</div>

{% endblock %}
