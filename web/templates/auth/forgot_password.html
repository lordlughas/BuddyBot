{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body">

                <h4 class="text-center mb-4">Reset Password</h4>

                <form id="forgotForm">
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>

                    <!-- <button class="btn btn-warning w-100">Send Reset Link</button> -->
                     <button class="btn btn-warning w-100 flex items-center justify-center">
                        <span id="forgotSpinner" class="spinner-border spinner-border-sm mr-2 hidden"></span>
                        <span id="forgotBtnText">Send Reset Link</span>
                    </button>

                </form>
                <!-- Message placeholders -->
                <div id="forgotErrorBox" class="mt-3"></div>
                <div id="forgotSuccessBox" class="mt-3"></div>
                <div id="forgotMockLinkBox" class="mt-3"></div>


                <div class="mt-3 text-center">
                    <a href="/auth/login-page">Back to Login</a>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
const forgotForm = document.getElementById("forgotForm");
const forgotBtn = forgotForm.querySelector("button");
const forgotBtnText = document.getElementById("forgotBtnText");
const forgotSpinner = document.getElementById("forgotSpinner");

forgotForm.addEventListener("submit", async function(e) {
  e.preventDefault();

  const formData = new FormData(this);

  // Loading state
  forgotSpinner.classList.remove("hidden");
  forgotBtnText.textContent = "Sending...";
  forgotBtn.disabled = true;

  try {
    const res = await fetch("/auth/forgot-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({ email: formData.get("email") })
    });

    const result = await res.json().catch(() => ({}));

    // Clear old messages
    document.getElementById("forgotErrorBox").innerHTML = "";
    document.getElementById("forgotSuccessBox").innerHTML = "";
    document.getElementById("forgotMockLinkBox").innerHTML = "";

    if (res.ok) {
      document.getElementById("forgotSuccessBox").innerHTML =
        `<div class="alert alert-success">${result.message || "Reset link sent successfully."}</div>`;
      if (result.mock_reset_link) {
        document.getElementById("forgotMockLinkBox").innerHTML =
          `<div class="alert alert-info">
            Mock email link:
            <a href="${result.mock_reset_link}" class="alert-link">Open reset page</a>
          </div>`;
      }
    } else {
      document.getElementById("forgotErrorBox").innerHTML =
        `<div class="alert alert-danger">${result.error || "Failed to send reset link."}</div>`;
    }
  } catch (error) {
    document.getElementById("forgotErrorBox").innerHTML =
      `<div class="alert alert-danger">Network error. Please try again.</div>`;
  }

    // Reset state
    forgotSpinner.classList.add("hidden");
    forgotBtnText.textContent = "Send Reset Link";
    forgotBtn.disabled = false;


});
</script>

{% endblock %}
